name: .NET Build CI

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
    - name: Restore
      run: dotnet restore InnocentGuardPart3.csproj
    - name: Build
      run: dotnet build InnocentGuardPart3.csproj --no-restore
